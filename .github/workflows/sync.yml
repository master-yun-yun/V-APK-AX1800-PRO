name: Sync Upstream

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_APK }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync upstream and show results
        id: sync
        run: |
          set -euo pipefail
          
          # 1. 添加上游并获取最新代码（包含标签）
          git remote add upstream https://github.com/VIKINGYFY/OpenWRT-CI.git 2>/dev/null || git remote set-url upstream https://github.com/VIKINGYFY/OpenWRT-CI.git
          git fetch upstream --tags
          
          LOCAL_SHA=$(git rev-parse --short HEAD)
          UPSTREAM_SHA=$(git rev-parse --short upstream/main)
          LOCAL_FULL=$(git rev-parse HEAD)
          
          echo "========================================"
          echo "🔍 同步前状态检查"
          echo "========================================"
          echo "📌 本地 main:  $LOCAL_SHA"
          echo "📌 上游 main:  $UPSTREAM_SHA"
          
          # 情况A：完全一致
          if [ "$LOCAL_FULL" = "$(git rev-parse upstream/main)" ]; then
            echo ""
            echo "✅ 结果：本地与上游完全一致，无需同步"
            echo "========================================"
            exit 0
          fi
          
          # 情况B：本地领先上游
          if git merge-base --is-ancestor upstream/main HEAD; then
            AHEAD=$(git rev-list --count upstream/main..HEAD)
            echo ""
            echo "✅ 结果：本地领先上游 $AHEAD 个提交"
            echo "   （这些是你的自定义修改，无需同步上游）"
            echo "========================================"
            exit 0
          fi
          
          # 情况C：本地落后上游，需要同步
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo ""
          echo "🆕 检测到上游有 $BEHIND 个新提交，准备同步..."
          echo "========================================"
          
          # 3. 执行 rebase
          if git rebase upstream/main; then
            NEW_SHA=$(git rev-parse --short HEAD)
            NEW_FULL=$(git rev-parse HEAD)
            SYNC_COMMITS=$(git rev-list --count $LOCAL_FULL..$NEW_FULL)
            
            echo ""
            echo "========================================"
            echo "✅ 同步成功！"
            echo "========================================"
            echo "📊 统计信息"
            echo "   • 同步前提交: $LOCAL_SHA"
            echo "   • 同步后提交: $NEW_SHA"
            echo "   • 新增上游提交: $SYNC_COMMITS 个"
            echo ""
            echo "📝 新增提交列表:"
            git log --oneline --no-decorate --reverse -n 30 $LOCAL_FULL..$NEW_FULL
            if [ "$SYNC_COMMITS" -gt 30 ]; then
              echo "   ... 还有 $((SYNC_COMMITS - 30)) 个提交未显示"
            fi
            echo ""
            echo "📁 文件变更统计:"
            git diff --stat $LOCAL_FULL $NEW_FULL || true
            echo "========================================"
            
            # 推送到你的仓库
            echo ""
            echo "🚀 正在推送到 origin/main..."
            git push origin main --force-with-lease
            echo "✅ 推送完成！"
            echo "========================================"
            
          else
            # ==================== 冲突详细诊断 ====================
            echo ""
            echo "========================================"
            echo "❌ 同步失败！检测到代码冲突"
            echo "========================================"
            
            # 获取冲突文件列表
            CONFLICT_FILES=$(git diff --name-only --diff-filter=U || true)
            if [ -z "$CONFLICT_FILES" ]; then
              echo "⚠️ 无法获取冲突文件列表（rebase 可能因其他原因失败）"
              git rebase --abort || true
              exit 1
            fi
            
            echo "📝 冲突文件列表:"
            echo "$CONFLICT_FILES"
            echo ""
            
            # 逐个文件深度诊断
            for file in $CONFLICT_FILES; do
              echo "========================================"
              echo "📄 冲突文件: $file"
              echo "========================================"
              
              if [ -f "$file" ]; then
                echo "🔄 冲突标记位置:"
                grep -n -E '^<{7}|^={7}|^>{7}' "$file" || true
                echo ""
                
                echo "📜 本地历史中谁修改过这个文件:"
                git log --oneline --all -- "$file" | head -10 || echo "   （无本地修改记录）"
                echo ""
                
                echo "🔼 上游最新提交对这个文件的修改:"
                git diff upstream/main^..upstream/main -- "$file" || echo "   （无法获取上游差异）"
                echo ""
                
                echo "📋 当前冲突内容预览（前50行）:"
                head -n 50 "$file" || true
                echo ""
              else
                echo "⚠️ 文件已被删除或无法读取"
              fi
              echo ""
            done
            
            echo "========================================"
            echo "💡 冲突说明:"
            echo "   • <<<<<<< HEAD  后面是你的本地修改内容"
            echo "   • =======        是分隔线"
            echo "   • >>>>>>>        后面是上游（VIKINGYFY）的新内容"
            echo ""
            echo "🔧 快速解决命令（复制粘贴执行）:"
            echo ""
            echo "   方案1：保留上游版本（推荐，如果你没修改过这些文件）"
            for file in $CONFLICT_FILES; do
              echo "      git checkout --theirs \"$file\""
            done
            echo "      git add ."
            echo "      git rebase --continue"
            echo "      git push origin main --force"
            echo ""
            echo "   方案2：保留你的本地版本"
            for file in $CONFLICT_FILES; do
              echo "      git checkout --ours \"$file\""
            done
            echo "      git add ."
            echo "      git rebase --continue"
            echo "      git push origin main --force"
            echo ""
            echo "   方案3：手动编辑解决（最精确）"
            echo "      # 编辑冲突文件，删除 <<<<<<< / ======= / >>>>>>> 标记"
            echo "      # 保留你想要的代码，然后："
            echo "      git add ."
            echo "      git rebase --continue"
            echo "      git push origin main --force"
            echo "========================================"
            
            # 安全回退
            echo ""
            echo "🔄 正在中止 rebase，恢复到同步前状态..."
            git rebase --abort || true
            echo "✅ 已恢复到同步前状态"
            echo "========================================"
            exit 1
          fi
