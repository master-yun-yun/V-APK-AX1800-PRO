#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix libfuse-dev
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt
       
      - name: Initialization Values
        run: |
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_WIFI=wifi-yes" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
              find "$DIR" -type f -exec touch {} +
            done

            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build

            echo "toolchain skiped done!"
          else
            echo "caches missed!"
          fi

          if ${{steps.check-cache.outputs.cache-hit != 'true'}}; then
            CACHE_LIST=$(gh cache list --key "$WRT_CONFIG-$WRT_INFO" | cut -f 1)
            for CACHE_KEY in $CACHE_LIST; do
              gh cache delete $CACHE_KEY
            done

            echo "caches cleanup done!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig -j$(nproc) && make clean -j$(nproc)

      # ========== 1. 获取 Easytier 最新版本 ==========2026.06.20新增====== #
      - name: Get EasyTier latest version
        id: easytier_version
        if: env.WRT_TEST != 'true'
        run: |
          if [ -f /tmp/easytier_version ]; then
            VERSION=$(cat /tmp/easytier_version)
            echo "Using cached version: ${VERSION}"
          else
            VERSION=$(curl -s https://api.github.com/repos/EasyTier/EasyTier/releases/latest | grep '"tag_name":' | head -1 | sed -E 's/.*"tag_name": "([^"]+)".*/\1/')
            if [ -z "${VERSION}" ] || [ "${VERSION}" = "null" ]; then
              echo "Warning: Failed to fetch latest version from GitHub API, using fallback"
              VERSION="v2.6.4"
            fi
            echo "${VERSION}" > /tmp/easytier_version
            echo "Fetched latest version: ${VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      # ========== 2. 提取目标架构 ==========
      - name: Get target architecture for Easytier
        id: easytier_arch
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/
          ARCH=$(grep '^CONFIG_ARCH=' .config | cut -d= -f2 | tr -d '"')
          CPU_TYPE=$(grep '^CONFIG_CPU_TYPE=' .config | cut -d= -f2 | tr -d '"')
          case "${ARCH}" in
            x86_64)     SLUG="x86_64" ;;
            aarch64)    SLUG="aarch64" ;;
            arm)
              if echo "${CPU_TYPE}" | grep -qE "cortex-a9|cortex-a7|cortex-a8|cortex-a15|cortex-a17"; then
                SLUG="armv7"
              elif echo "${CPU_TYPE}" | grep -qE "cortex-a5|cortex-a53"; then
                SLUG="armhf"
              else
                SLUG="arm"
              fi ;;
            mipsel)     SLUG="mipsel" ;;
            mips)       SLUG="mips" ;;
            riscv64)    SLUG="riscv64" ;;
            loongarch64) SLUG="loongarch64" ;;
            *)          SLUG="unknown" ;;
          esac
          echo "arch=${SLUG}" >> $GITHUB_OUTPUT

      # ========== 3. 缓存二进制文件 ==========
      - name: Cache EasyTier binaries
        id: cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ./wrt/files/usr/bin/easytier-core
            ./wrt/files/usr/bin/easytier-cli
            ./wrt/files/usr/bin/easytier-web
            ./wrt/files/usr/bin/easytier-web-embed
          key: easytier-${{ steps.easytier_version.outputs.version }}-${{ steps.easytier_arch.outputs.arch }}

      # ========== 4. 下载二进制（缓存未命中时） ==========
      - name: Download EasyTier binaries
        if: env.WRT_TEST != 'true' && steps.cache.outputs.cache-hit != 'true'
        run: |
          cd ./wrt/
          mkdir -p files/usr/bin

          # 复用前面步骤的输出
          EASYTIER_VERSION="${{ steps.easytier_version.outputs.version }}"
          ET_ARCH="${{ steps.easytier_arch.outputs.arch }}"

          if [ -z "${EASYTIER_VERSION}" ] || [ "${ET_ARCH}" = "unknown" ]; then
            echo "Error: Invalid version or architecture"
            exit 1
          fi
          echo "Using EasyTier version: ${EASYTIER_VERSION}, arch: ${ET_ARCH}"

          # 确保 unzip 可用
          if ! command -v unzip &> /dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y unzip || {
              echo "Error: Failed to install unzip"
              exit 1
            }
          fi

          # 下载（带重试和备用源）
          ZIP_FILE="easytier-linux-${ET_ARCH}-${EASYTIER_VERSION}.zip"
          PRIMARY_URL="https://ghfast.top/https://github.com/EasyTier/EasyTier/releases/download/${EASYTIER_VERSION}"
          FALLBACK_URL="https://github.com/EasyTier/EasyTier/releases/download/${EASYTIER_VERSION}"

          download_with_retry() {
            local url=$1 output=$2 retries=3
            for i in $(seq 1 $retries); do
              echo "Attempt $i: downloading ${url} ..."
              wget -q --show-progress -O "${output}" "${url}" && return 0
              sleep 3
            done
            return 1
          }

          if ! download_with_retry "${PRIMARY_URL}/${ZIP_FILE}" /tmp/easytier.zip; then
            echo "Primary mirror failed, trying fallback..."
            if ! download_with_retry "${FALLBACK_URL}/${ZIP_FILE}" /tmp/easytier.zip; then
              echo "Error: Failed to download ${ZIP_FILE}"
              exit 1
            fi
          fi

          # 验证下载
          [ -s /tmp/easytier.zip ] || { echo "Error: Empty download"; exit 1; }

          # 解压
          unzip -o /tmp/easytier.zip -d /tmp/easytier || { echo "Error: Extract failed"; exit 1; }

          EXTRACT_DIR=$(find /tmp/easytier -maxdepth 1 -type d | grep -v "^/tmp/easytier$" | head -1)
          [ -n "${EXTRACT_DIR}" ] || { echo "Error: No extract dir"; ls -la /tmp/easytier/; exit 1; }

          # 复制文件
          for bin in easytier-core easytier-cli easytier-web easytier-web-embed; do
            if [ -f "${EXTRACT_DIR}/${bin}" ]; then
              cp "${EXTRACT_DIR}/${bin}" files/usr/bin/
              chmod +x "files/usr/bin/${bin}"
              echo "Installed: ${bin}"
            fi
          done

          # 验证核心文件
          [ -f "files/usr/bin/easytier-core" ] || { echo "Error: easytier-core missing"; exit 1; }

          # 清理
          rm -rf /tmp/easytier.zip /tmp/easytier
          echo "EasyTier binaries installed successfully"

      # ========== 5. 修正权限（仅缓存命中时） ==========
      - name: Fix EasyTier permissions
        if: env.WRT_TEST != 'true' && steps.cache.outputs.cache-hit == 'true'
        run: |
          cd ./wrt/
          for f in files/usr/bin/easytier-*; do
            [ -f "$f" ] && chmod +x "$f" && echo "Fixed: $f"
          done

      # ========== 获取 Easytier 最新版本 ==========2026.06.20新增====== #

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make -j$(nproc) || make -j1 V=s

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            echo "WRT_KVER=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^kernel - \K[\d\.]+' {} \;)" >> $GITHUB_ENV
            echo "WRT_LIST=$(find ./bin/targets/ -type f -name "*.manifest" -exec grep -oP '^luci-(app|theme)[^ ]*' {} \; | tr '\n' ' ')" >> $GITHUB_ENV

            find ./bin/targets/ -iregex ".*\(buildinfo\|json\|sha256sums\|packages\)$" -exec rm -rf {} +

            for FILE in $(find ./bin/targets/ -type f -iname "*$WRT_TARGET*") ; do
              EXT=$(basename $FILE | cut -d '.' -f 2-)
              NAME=$(basename $FILE | cut -d '.' -f 1 | grep -io "\($WRT_TARGET\).*")
              NEW_FILE="$NAME"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_WIFI"-"$WRT_DATE"."$EXT"
              mv -f $FILE ./upload/$NEW_FILE
            done

            find ./bin/targets/ -type f -exec mv -f {} ./upload/ \;

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |
            这是个平台固件包，内含多个设备！
            请注意选择你需要的设备固件！
            不要问，刷就完事了！

            全系带开源硬件加速，别问了！

            源码：${{env.WRT_REPO}}
            分支：${{env.WRT_BRANCH}}
            提交：${{env.WRT_HASH}}

            配置：${{env.WRT_CONFIG}}
            平台：${{env.WRT_TARGET}}

            登录地址：${{env.WRT_IP}}
            登录密码：${{env.WRT_PW}}

            WIFI名称：${{env.WRT_SSID}}
            WIFI密码：${{env.WRT_WORD}}

            内核版本：${{env.WRT_KVER}}
            插件列表：${{env.WRT_LIST}}
